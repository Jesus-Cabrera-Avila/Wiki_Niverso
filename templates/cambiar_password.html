{% extends "base.html" %}

{% block title %}Cambiar contraseña{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-4">
        <div class="card p-4 shadow" style="background-color: #1f2a36; color: #ffffff; border-radius: 15px;">

            <h2 class="text-center mb-4">Cambiar contraseña</h2>

            {% if mensaje %}
            <div class="alert alert-success">
                {{ mensaje }}
            </div>
            {% endif %}

            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label" style="color: #a680d8;">Correo electrónico</label>

                    <input
                        type="email"
                        name="correo"
                        class="form-control"
                        style="background-color: #2c3e50; color: white; border: none;"
                        required
                    >
                </div>

                <button class="btn w-100 mb-3"
                        style="background-color: #a680d8; border-color: #a680d8; color: white;">
                            Enviar Correo
                </button>

            </form>

        </div>
    </div>
</div>
{% endblock %}
