{% extends "base.html" %}

{% block title %}Comics{% endblock %}

{% block content %}

<div class="container py-5">

    <h2 class="text-center mb-5" style="color: #ffffff;">
        Comics
    </h2>

    <div class="row justify-content-center g-4">

<div class="col-md-4">

    <div class="card shadow h-100"
        style="
        background-color: #1f2a36;
        border: none;
        border-radius: 15px;
        color: white;
        overflow: hidden;
        ">

<img src="{{ url_for('static', filename='img/batman.jpg') }}"
    class="card-img-top"
    alt="Batman"
    style="
    height: 220px;
    width: 100%;
    object-fit: cover;
    border-top-left-radius: 15px;
    border-top-right-radius: 15px;">

        <div class="card-body d-flex flex-column">

            <h5 class="card-title"
                style="color: #a680d8;">
                Comic: Batman
            </h5>

            <p class="card-text">
                El diseño mantiene la misma paleta
                de colores del formulario login.
            </p>

            <a href="#"
                class="btn mt-auto"
                style="
                background-color: #a680d8;
                border: none;
                color: white;
                ">
                Entrar
            </a>

        </div>

    </div>

</div>

{% endblock %}
