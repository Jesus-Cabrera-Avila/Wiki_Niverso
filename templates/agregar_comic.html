{% extends "base.html" %}

{% block title %}Agregar cómic{% endblock %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-5">

        <div class="card p-4 shadow" style="background-color: #1f2a36; color: white; border-radius: 15px;">

            <h2 class="text-center mb-4">Agregar cómic</h2>

            <form method="POST" action="{{ url_for('guardar_comic') }}">

                <div class="mb-3">
                    <label style="color:#a680d8;">Título</label>
                    <input type="text" name="titulo" class="form-control" style="background:#2c3e50;color:white;border:none;" required>
                </div>

                <div class="mb-3">
                    <label style="color:#a680d8;">Autor</label>
                    <input type="text" name="autor" class="form-control" style="background:#2c3e50;color:white;border:none;" required>
                </div>

                <div class="mb-3">
                    <label style="color:#a680d8;">Descripción</label>
                    <textarea name="descripcion" class="form-control" style="background:#2c3e50;color:white;border:none;"></textarea>
                </div>

                <div class="mb-3">
                
                    <label style="color:#a680d8;">
                        Categoría
                    </label>
                
                    <select
                        name="categoria"
                        class="form-control"
                        style="background:#2c3e50;color:white;border:none;">
                
                        <option value="comic">Comic</option>
                
                        <option value="manga">Manga</option>
                
                        <option value="libro">Libro</option>
                
                    </select>
                
                </div>

                <button class="btn w-100" style="background:#a680d8;color:white;">
                    Guardar cómic
                </button>

            </form>

        </div>

    </div>
</div>

{% endblock %}
