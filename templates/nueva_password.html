{% extends "base.html" %}

{% block title %}Nueva contraseña{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-4">

        <div class="card p-4 shadow" style="background-color: #1f2a36; color: #ffffff; border-radius: 15px;">

            <h2 class="text-center mb-4">
                Nueva contraseña
            </h2>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label" style="color: #a680d8;">
                        Nueva contraseña
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        style="background-color: #2c3e50; color: white; border: none;"
                        minlength="8"
                        required
                    >

                </div>

                <button class="btn w-100"
                        style="background-color: #a680d8; border-color: #a680d8; color: white;">

                    Cambiar contraseña

                </button>

            </form>

        </div>

    </div>
</div>
{% endblock %}
