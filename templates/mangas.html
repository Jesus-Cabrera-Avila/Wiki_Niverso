{% extends "base.html" %}

{% block title %}Mangas{% endblock %}

{% block content %}

<div class="container py-5">

    <h2 class="text-center mb-5" style="color:white;">
        Mangas
    </h2>

    <!-- BOTONES -->

    <div class="d-flex justify-content-center gap-3 mb-5 flex-wrap">

        <a href="{{ url_for('comics_page') }}"
        class="btn"
        style="background:#1f2a36;color:white;border:1px solid #a680d8;">
            Comics
        </a>

        <a href="{{ url_for('mangas_page') }}"
        class="btn"
        style="background:#a680d8;color:white;border:none;">
            Mangas
        </a>

        <a href="{{ url_for('libros_page') }}"
        class="btn"
        style="background:#1f2a36;color:white;border:1px solid #a680d8;">
            Libros
        </a>

    </div>

    <div class="row g-4 justify-content-center">

        <!-- MANGA -->

        <div class="col-md-4">

            <div class="card h-100 shadow"
            style="background:#1f2a36;border:none;border-radius:15px;color:white;overflow:hidden;">

                <img
                    src="{{ url_for('static', filename='img/naruto.jpg') }}"
                    style="height:220px;object-fit:cover;width:100%;"
                >

                <div class="card-body d-flex flex-column">

                    <h5 style="color:#a680d8;">
                        Naruto
                    </h5>

                    <p>
                        Un joven ninja sueña con convertirse en el Hokage de su aldea.
                    </p>

                    <small>
                        Autor: Masashi Kishimoto
                    </small>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
