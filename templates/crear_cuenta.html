{% extends "base.html" %}

{% block title %}Registro{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-4">
        <div class="card p-4 shadow" style="background-color: #1f2a36; color: #ffffff; border-radius: 15px;">

            <h2 class="text-center mb-4">Crear cuenta</h2>

            {% if error %}
            <div class="alert alert-danger text-center">
                {{ error }}
            </div>
            {% endif %}

            <form action="/registrar" method="POST">

                <div class="mb-3">
                    <label class="form-label" style="color: #a680d8;">Email</label>

                    <input type="email" name="usuario" class="form-control"
                            style="background-color: #2c3e50; color: white; border: none;" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" style="color: #a680d8;">Contraseña</label>

                    <input type="password" name="password" class="form-control"
                            style="background-color: #2c3e50; color: white; border: none;"
                            minlength="8" required>
                </div>

                <div class="row">
                    <label class="form-label" style="color: #a680d8;">Fecha de nacimiento</label>

                    <div class="col-md-4 mb-2">
                        <select class="form-select" style="background-color: #2c3e50; color: white; border: none;" name="dia" required>
                            <option value="">Día</option>

                            {% for i in range(1, 32) %}
                                <option>{{ i }}</option>
                            {% endfor %}

                        </select>
                    </div>

                    <div class="col-md-4 mb-2">
                        <select class="form-select" style="background-color: #2c3e50; color: white; border: none;" name="mes" required>

                            <option value="">Mes</option>

                            <option>Ene</option>
                            <option>Feb</option>
                            <option>Mar</option>
                            <option>Abr</option>
                            <option>May</option>
                            <option>Jun</option>
                            <option>Jul</option>
                            <option>Ago</option>
                            <option>Sep</option>
                            <option>Oct</option>
                            <option>Nov</option>
                            <option>Dic</option>

                        </select>
                    </div>

                    <div class="col-md-4 mb-2">
                        <select class="form-select" style="background-color: #2c3e50; color: white; border: none;" name="anio" required>

                            <option value="">Año</option>

                            {% for i in range(2025, 1969, -1) %}
                                <option>{{ i }}</option>
                            {% endfor %}

                        </select>
                    </div>
                </div>

                <div class="mb-3">

                    <label class="form-label" style="color: #a680d8;">Género</label>

                    <div class="form-check">

                        <input class="form-check-input" type="radio" name="genero" id="masculino" value="masculino">

                        <label class="form-check-label" for="masculino" style="color: #a680d8;">
                            Masculino
                        </label>

                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="genero" id="femenino" value="femenino">

                        <label class="form-check-label" for="femenino" style="color: #a680d8;">
                            Femenino
                        </label>

                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="genero" id="otro" value="otro">

                        <label class="form-check-label" for="otro" style="color: #a680d8;">
                            Otro
                        </label>

                    </div>
                </div>

                <button class="btn w-100 mb-3"
                        style="background-color: #a680d8; border-color: #a680d8; color: white;">
                        Registrarse
                </button>

                <div class="text-center">
                    <a href="{{ url_for('login') }}" style="color: #a680d8; font-size: 0.9rem; text-decoration: none;">
                        ¿Ya tienes cuenta? Inicia sesión
                    </a>
                </div>

            </form>

        </div>
    </div>
</div>
{% endblock %}
